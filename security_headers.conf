# =========================================================================
# COSMAEON — J.P. MORGAN GRADE SECURITY HEADERS & CDN WAF POLICIES
# File: security_headers.conf
# Target Server: Nginx (Fiduciary Gateway Nodes) / Akamai Edge Policies
# =========================================================================

# 1. CONTENT SECURITY POLICY (CSP)
# Enforces strict content limitations. Restricts script execution to local domains 
# and trusted CDNs, blocking Cross-Site Scripting (XSS) and script injections.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://markets.jpmorgan.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

# 2. HTTP STRICT TRANSPORT SECURITY (HSTS)
# Forces browsers to only connect via HTTPS for the next 2 years (63072000 seconds),
# including all subdomains, and preloaded into major browser distributions.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# 3. CLICKJACKING MITIGATION (X-FRAME-OPTIONS)
# Prevents the application from being embedded in <iframe> structures on other domains,
# completely eliminating Clickjacking risks.
add_header X-Frame-Options "DENY" always;

# 4. MIME-TYPE SNIFFING PREVENTION
# Blocks the browser from interpreting files as something other than what is declared 
# by the server (e.g. blocking executing images as scripts).
add_header X-Content-Type-Options "nosniff" always;

# 5. CROSS-SITE SCRIPTING (XSS) FILTER
# Activates the browser's built-in XSS filter, blocking rendering if XSS is detected.
add_header X-XSS-Protection "1; mode=block" always;

# 6. REFERRER POLICY
# Controls how much referrer information is passed on outgoing links (fiduciary privacy).
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 7. PERMISSIONS POLICY (FEATURE POLICY)
# Disables browser hardware access capabilities to minimize client device threat surfaces.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), accelerometer=()" always;

# 8. CORS CONSTRAINTS (CROSS-ORIGIN RESOURCE SHARING)
# Restricts data API endpoint queries to validated client portals.
add_header Access-Control-Allow-Origin "https://cosmaeon.in" always;
add_header Access-Control-Allow-Methods "GET, POST" always;
add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

